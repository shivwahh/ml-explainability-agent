# ==========================================================
# ML Explainability Agent Configuration
# ==========================================================

project:
  name: "ML Explainability Agent"
  version: "0.1.0"
  environment: "development"

# ==========================================================
# Ingestion Configuration
# ==========================================================
# Paths to the three user-provided artifacts. Any of these may be left
# null; missing artifacts are handled gracefully by ProjectKnowledge and
# surfaced through the validation report.

ingestion:

  model_path: "models/test_model.joblib"

  data_dictionary_path: null

  project_context_path: null

# ==========================================================
# Routing Configuration
# ==========================================================
# Maps a user question to a normalized intent via case-insensitive
# keyword matching. Intents are checked in order; the first match wins.
# Unmatched questions fall back to default_intent (the full pipeline).

routing:

  default_intent: "full_explanation"

  intents:

    decision_path:
      - "decision path"
      - "why did"
      - "how did"
      - "which rules"
      - "path"

    feature_importance:
      - "feature importance"
      - "most important"
      - "which features"
      - "influential"
      - "drivers"

    counterfactual:
      - "what if"
      - "make prediction"
      - "flip"
      - "change"
      - "counterfactual"

    prediction:
      - "what will"
      - "predict"
      - "prediction"
      - "outcome"

    local_explanation:
      - "shap"
      - "contribution"
      - "local contribution"
      - "feature contribution"
      - "attribution"
      - "impact of"

# ==========================================================
# Explanation Configuration
# ==========================================================
# Selects the explanation text provider. Use "echo" for a no-network,
# deterministic provider (dev/tests) or "openai" for LLM generation.

explanation:

  provider: "openai"

  model: "gpt-4.1-mini"

# ==========================================================
# Data Configuration
# ==========================================================

data:
  raw_data_path: "data/raw/"
  processed_data_path: "data/processed/"
  artifacts_path: "artifacts/"
  models_path: "models/"

# ==========================================================
# Model Configuration
# ==========================================================

model:

  type: "decision_tree"

  target_column: "target"

  training:

    test_size: 0.2

    random_state: 42

    max_depth: 4

    min_samples_split: 5

    min_samples_leaf: 2

# ==========================================================
# Explainability Configuration
# ==========================================================

explainability:

  enabled: true

  methods:

    - decision_path
    - feature_importance

  decision_path:

    enabled: true

  feature_importance:

    enabled: true

# ==========================================================
# Visualization Configuration
# ==========================================================

visualization:

  save_plots: true

  output_directory: "artifacts/visualizations"

  decision_tree:

    enabled: true

    max_depth: 4

# ==========================================================
# Logging Configuration
# ==========================================================

logging:

  level: "INFO"

  log_directory: "logs/"

# ==========================================================
# Agent Configuration
# ==========================================================

agent:

  framework: "langgraph"

  planner_agent:

    enabled: true

  explainer_agent:

    enabled: true

# ==========================================================
# Output Configuration
# ==========================================================

output:

  save_explanations: true

  explanation_directory: "artifacts/explanations"

  explanation_format: "markdown"